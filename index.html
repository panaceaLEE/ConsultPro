<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>상담 관리 시스템 — 대성하우징</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --navy:#0f2044;--navy2:#1b3470;--accent:#1d5fd8;
  --border:#e2e8f0;--bg:#f0f4f9;
  --surface:#fff;--text:#0f172a;--text2:#475569;--text3:#94a3b8;
  --r:8px;
  /* 진행상황 색상 */
  --st-consult:#64748b; /* 1차상담 */
  --st-survey:#0891b2;  /* 실측 */
  --st-quote:#0369a1;   /* 견적 */
  --st-pay:#7c3aed;     /* 결제완료 */
  --st-sched:#d97706;   /* 시공예정 */
  --st-done:#15803d;    /* 시공완료 */
}
body{font-family:'Apple SD Gothic Neo','Malgun Gothic',-apple-system,sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.5;}

/* ═══ LOGIN ═══ */
#loginScreen{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(140deg,#071633 0%,#0f2044 50%,#1a3a7a 100%);}
.auth-box{background:#fff;border-radius:20px;padding:36px 40px;width:380px;max-width:94vw;box-shadow:0 24px 64px rgba(0,0,0,.35);}
.auth-logo{text-align:center;margin-bottom:28px;}
.auth-brand{font-size:12px;font-weight:700;color:var(--accent);letter-spacing:2px;text-transform:uppercase;margin-bottom:8px;}
.auth-logo h1{font-size:24px;font-weight:800;color:var(--navy);}
.auth-logo p{color:var(--text2);font-size:13px;margin-top:4px;}
.fld{margin-bottom:14px;}
.fld label{display:block;font-size:12px;font-weight:700;color:var(--text2);margin-bottom:5px;letter-spacing:.3px;}
.fld input{width:100%;padding:10px 14px;border:1.5px solid var(--border);border-radius:var(--r);font-size:15px;outline:none;font-family:inherit;color:var(--text);transition:border-color .2s;}
.fld input:focus{border-color:var(--accent);}
.err{color:#b91c1c;font-size:12px;margin-bottom:8px;min-height:16px;}
.btn-main{width:100%;padding:12px;background:var(--navy);color:#fff;border:none;border-radius:var(--r);font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;transition:background .2s;}
.btn-main:hover{background:var(--navy2);}
.btn-sec{width:100%;padding:11px;background:#f1f5f9;color:var(--text2);border:none;border-radius:var(--r);font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;margin-top:8px;transition:background .2s;}
.btn-sec:hover{background:var(--border);}
.divider{text-align:center;color:var(--text3);font-size:12px;margin:14px 0;position:relative;}
.divider::before,.divider::after{content:'';position:absolute;top:50%;width:42%;height:1px;background:var(--border);}
.divider::before{left:0;} .divider::after{right:0;}

/* ═══ APP LAYOUT ═══ */
#app{display:none;flex-direction:column;height:100vh;}
#app.on{display:flex;}
.hdr{display:flex;align-items:center;gap:14px;padding:0 20px;height:56px;background:linear-gradient(120deg,#0f2044,#1b3470);color:#fff;flex-shrink:0;}
.hdr-brand{font-size:18px;font-weight:800;letter-spacing:-.5px;}
.hdr-sub{font-size:13px;opacity:.7;font-weight:600;}
.hdr-date-wrap{display:flex;flex-direction:column;line-height:1.25;border-left:1px solid rgba(255,255,255,.2);padding-left:14px;}
.hdr-today-date{font-size:13px;opacity:.9;}
.hdr-sync-label{font-size:11px;opacity:.6;}
.hdr-spacer{flex:1;}
.hdr-right{display:flex;align-items:center;gap:10px;}
.hdr-user-name{font-size:13px;font-weight:700;}
.ub{font-size:11px;font-weight:700;padding:4px 10px;border-radius:20px;border:none;}
.ub.admin,.ub.manager{background:rgba(96,165,250,.25);color:#93c5fd;}
.ub.sales{background:rgba(255,255,255,.15);color:#e2e8f0;}
.sync-dot{width:9px;height:9px;border-radius:50%;display:inline-block;cursor:pointer;background:#22c55e;}
.hdr-btn{padding:5px 12px;background:rgba(255,255,255,.12);color:#e2e8f0;border:1px solid rgba(255,255,255,.2);border-radius:var(--r);font-size:12px;cursor:pointer;font-family:inherit;transition:background .2s;}
.hdr-btn:hover{background:rgba(255,255,255,.22);}

/* 컨트롤 바 */
.cbar{display:flex;align-items:center;gap:12px;padding:10px 20px;background:#fff;border-bottom:1px solid var(--border);flex-wrap:wrap;flex-shrink:0;}
.vtabs{display:flex;background:var(--bg);border-radius:var(--r);padding:3px;gap:2px;}
.vtab{padding:6px 14px;border-radius:6px;border:none;background:transparent;font-size:13px;font-weight:500;color:var(--text2);cursor:pointer;transition:all .15s;font-family:inherit;white-space:nowrap;}
.vtab.on{background:#fff;color:var(--navy);box-shadow:0 1px 4px rgba(0,0,0,.12);font-weight:700;}
.dnav{display:flex;align-items:center;gap:4px;}
.nav-arrow{padding:4px 11px;background:#fff;border:1px solid var(--border);border-radius:var(--r);font-size:16px;cursor:pointer;color:var(--navy);transition:background .15s;}
.nav-arrow:hover{background:var(--bg);}
.dlabel{font-size:15px;font-weight:700;color:var(--navy);min-width:150px;text-align:center;}
.today-btn{padding:5px 12px;background:#fff;border:1px solid var(--border);border-radius:var(--r);font-size:12px;font-weight:600;cursor:pointer;color:var(--text2);font-family:inherit;}
.today-btn:hover{background:var(--bg);}
.cbar-divider{width:1px;height:24px;background:var(--border);}
.cbar-spacer{flex:1;}
.func-btn{display:inline-flex;align-items:center;gap:6px;padding:6px 13px;border:none;border-radius:var(--r);font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;background:#e8f0fe;color:#1e40af;transition:filter .15s;}
.func-btn:hover{filter:brightness(.95);}
.func-add{background:var(--navy);color:#fff;}
.func-xlsx{background:#dcfce7;color:#15803d;}
.func-pdf{background:#fee2e2;color:#b91c1c;}
.filter-sel{padding:6px 10px;border:1px solid var(--border);border-radius:var(--r);font-size:13px;font-family:inherit;color:var(--text);background:#fff;cursor:pointer;outline:none;}
.filter-sel:focus{border-color:var(--accent);}
.search-inp{padding:6px 10px;border:1px solid var(--border);border-radius:var(--r);font-size:13px;font-family:inherit;width:150px;outline:none;}
.search-inp:focus{border-color:var(--accent);}

/* 메인 */
.mcontent{flex:1;overflow:auto;padding:18px 20px 26px;}

/* ═══ STATS ═══ */
.stats{display:grid;grid-template-columns:repeat(6,1fr);gap:8px;margin-bottom:12px;}
.stat-box{background:#fff;border-radius:12px;padding:11px 14px;border:1px solid var(--border);border-left:4px solid #cbd5e1;box-shadow:0 1px 3px rgba(0,0,0,.05);display:flex;flex-direction:column;gap:2px;min-width:0;}
.stat-box.gray{border-left-color:#64748b;}
.stat-box.cyan{border-left-color:#0891b2;}
.stat-box.blue{border-left-color:#0369a1;}
.stat-box.purple{border-left-color:#7c3aed;}
.stat-box.amber{border-left-color:#d97706;}
.stat-box.green{border-left-color:#15803d;}
.stat-label{font-size:13px;color:var(--text2);font-weight:700;margin-bottom:3px;}
.stat-cnt{font-size:22px;font-weight:800;color:var(--navy);line-height:1.1;font-variant-numeric:tabular-nums;}
.stat-cnt small{font-size:13px;font-weight:600;color:var(--text3);}
.stat-amt{font-size:12px;font-weight:700;color:var(--text2);margin-top:2px;font-variant-numeric:tabular-nums;}
.stat-box.green .stat-cnt{color:#15803d;}
.stat-box.purple .stat-cnt{color:#6d28d9;}
.stat-box.amber .stat-cnt{color:#b45309;}

/* ═══ 테이블 ═══ */
.tbl-wrap{overflow:auto;border-radius:12px;border:1px solid var(--border);background:#fff;box-shadow:0 2px 8px rgba(0,0,0,.06);max-height:calc(100vh - 250px);}
.dtable{width:100%;border-collapse:collapse;font-size:13px;min-width:1100px;}
.dtable thead{position:sticky;top:0;z-index:10;}
.dtable thead th{background:#1e3560;color:#fff;padding:0 9px;height:46px;font-weight:700;white-space:nowrap;text-align:center;font-size:12px;border-left:1px solid rgba(255,255,255,.08);}
.dtable td{padding:8px 9px;border-bottom:1px solid #e8eef6;text-align:center;white-space:nowrap;border-left:1px solid #eef3f9;}
.dtable td.lft{text-align:left;}
.dtable tbody tr:nth-child(even) td{background:#f6f9fd;}
.dtable tbody tr:hover td{background:#eef5ff;cursor:pointer;}
.tag{display:inline-block;font-size:11px;font-weight:700;padding:2px 8px;border-radius:6px;white-space:nowrap;}
.tag-consult{background:#f1f5f9;color:#475569;}
.tag-survey{background:#cffafe;color:#0e7490;}
.tag-quote{background:#e0f2fe;color:#0369a1;}
.tag-pay{background:#f3e8ff;color:#7c3aed;}
.tag-sched{background:#fff7ed;color:#c2410c;}
.tag-done{background:#dcfce7;color:#15803d;}
.tag-cancel{background:#fee2e2;color:#b91c1c;}
.tag-type-c{background:#e0f2fe;color:#0369a1;}
.tag-type-i{background:#fef3c7;color:#b45309;}
.tag-cat{background:#eef2f7;color:#475569;}
.amt-cell{font-variant-numeric:tabular-nums;font-weight:700;}

/* ═══ 분류(차트) 뷰 ═══ */
.cls-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:14px;}
.cls-card{background:#fff;border:1px solid var(--border);border-radius:14px;padding:16px 18px;box-shadow:0 2px 8px rgba(0,0,0,.05);}
.cls-title{font-size:15px;font-weight:800;color:var(--navy);margin-bottom:14px;display:flex;align-items:center;gap:8px;}
.cls-title .ico{font-size:17px;}
.bar-row{display:flex;align-items:center;gap:10px;margin-bottom:9px;}
.bar-label{font-size:13px;font-weight:700;color:var(--text2);width:88px;flex-shrink:0;text-align:right;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.bar-track{flex:1;height:22px;background:#f1f5f9;border-radius:6px;overflow:hidden;position:relative;}
.bar-fill{height:100%;border-radius:6px;display:flex;align-items:center;padding-left:8px;color:#fff;font-size:11px;font-weight:800;min-width:2px;transition:width .4s;}
.bar-cnt{font-size:13px;font-weight:800;color:var(--navy);width:62px;flex-shrink:0;font-variant-numeric:tabular-nums;}
.bar-cnt small{font-size:10px;color:var(--text3);font-weight:600;}

/* ═══ 보고서 뷰 ═══ */
.rpt-wrap{background:#fff;border:1px solid var(--border);border-radius:14px;padding:24px 28px;box-shadow:0 2px 8px rgba(0,0,0,.05);max-width:1000px;margin:0 auto;}
.rpt-head{text-align:center;border-bottom:2px solid var(--navy);padding-bottom:14px;margin-bottom:20px;}
.rpt-head h2{font-size:22px;font-weight:800;color:var(--navy);}
.rpt-head p{font-size:13px;color:var(--text2);margin-top:5px;}
.rpt-sec{margin-bottom:24px;}
.rpt-sec h3{font-size:15px;font-weight:800;color:var(--navy);margin-bottom:10px;padding-left:9px;border-left:4px solid var(--accent);}
.rpt-table{width:100%;border-collapse:collapse;font-size:13px;}
.rpt-table th{background:#f0f4fb;color:var(--text2);padding:9px 12px;text-align:center;font-size:12px;font-weight:700;border:1px solid var(--border);}
.rpt-table td{padding:9px 12px;text-align:center;border:1px solid var(--border);font-variant-numeric:tabular-nums;}
.rpt-table td.lft{text-align:left;}
.rpt-table tr.sum td{background:#eef3fb;font-weight:800;color:var(--navy);}
.rpt-combined tr.br-row td{background:#e8eef9;font-weight:800;color:#1e3560;border-top:2px solid #c7d9f5;}
.rpt-combined tr.mg-row td{background:#fff;font-size:12px;}
.rpt-combined tr.mg-row:hover td{background:#f6f9fd;}
.rpt-kpi{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:8px;}
.rpt-kpi-box{background:#f8fafc;border:1px solid var(--border);border-radius:10px;padding:12px;text-align:center;}
.rpt-kpi-box .k{font-size:12px;color:var(--text2);font-weight:700;margin-bottom:4px;}
.rpt-kpi-box .v{font-size:22px;font-weight:800;color:var(--navy);}
.rpt-kpi-box .vs{font-size:12px;color:var(--text3);margin-top:2px;}

/* ═══ MODAL ═══ */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:100;align-items:center;justify-content:center;backdrop-filter:blur(4px);}
.overlay.on{display:flex;}
.mbox{background:#fff;border-radius:18px;padding:26px 30px;width:620px;max-width:94vw;box-shadow:0 20px 60px rgba(0,0,0,.3);max-height:92vh;overflow-y:auto;}
.mtitle{font-size:20px;font-weight:800;color:var(--navy);margin-bottom:18px;}
.mgrid2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.mfld{margin-bottom:13px;}
.mfld.full{grid-column:1/-1;}
.mlabel{display:block;font-size:12px;font-weight:700;color:var(--text2);margin-bottom:5px;}
.mfld input,.mfld select,.mfld textarea{width:100%;padding:9px 11px;border:1.5px solid var(--border);border-radius:var(--r);font-size:14px;outline:none;font-family:inherit;color:var(--text);transition:border-color .2s;background:#fff;}
.mfld input:focus,.mfld select:focus,.mfld textarea:focus{border-color:var(--accent);}
.mfld textarea{resize:vertical;min-height:64px;}
.merr{color:#b91c1c;font-size:12px;margin-bottom:8px;min-height:16px;}
.macts{display:flex;gap:8px;justify-content:flex-end;margin-top:18px;flex-wrap:wrap;}
.btn-ok{padding:10px 22px;background:var(--navy);color:#fff;border:none;border-radius:var(--r);font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;}
.btn-ok:hover{background:var(--navy2);}
.btn-cancel{padding:10px 16px;background:#f1f5f9;color:var(--text2);border:none;border-radius:var(--r);font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;}
.btn-cancel:hover{background:var(--border);}
.btn-del{padding:10px 16px;background:#fee2e2;color:#b91c1c;border:none;border-radius:var(--r);font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;}
.btn-del:hover{background:#fecaca;}
.dinfo{width:100%;font-size:14px;border-collapse:collapse;margin-bottom:8px;}
.dinfo td{padding:8px 6px;border-bottom:1px solid #f0f4f9;vertical-align:top;}
.dinfo td:first-child{color:var(--text2);width:96px;font-size:12px;font-weight:700;}
.user-table{width:100%;border-collapse:collapse;font-size:13px;}
.user-table th{text-align:left;padding:7px 8px;border-bottom:2px solid var(--border);color:var(--text2);font-size:12px;}
.user-table td{padding:7px 8px;border-bottom:1px solid #f0f4f9;}
#toast{position:fixed;top:70px;left:50%;transform:translateX(-50%);padding:11px 26px;border-radius:12px;font-size:14px;font-weight:700;z-index:9999;opacity:0;transition:opacity .4s;pointer-events:none;box-shadow:0 4px 20px rgba(0,0,0,.2);white-space:nowrap;color:#fff;}

@media(max-width:920px){
  .stats{grid-template-columns:repeat(3,1fr);}
  .mgrid2{grid-template-columns:1fr;}
  .rpt-kpi{grid-template-columns:repeat(2,1fr);}
}
@media(max-width:640px){
  .hdr{height:auto;padding:8px 12px;gap:8px;flex-wrap:wrap;}
  .hdr-brand{font-size:16px;} .hdr-sub{display:none;}
  .hdr-date-wrap{border-left:none;padding-left:0;} .hdr-sync-label{display:none;}
  .cbar{padding:8px 12px;gap:8px;}
  .vtabs{width:100%;overflow-x:auto;}
  .cbar-spacer{display:none;} .cbar-divider{display:none;}
  .search-inp{width:120px;}
  .mcontent{padding:12px 12px 20px;}
  .stats{grid-template-columns:repeat(2,1fr);gap:6px;}
  .stat-cnt{font-size:18px;}
  .tbl-wrap{max-height:none;}
  .mbox{width:96vw;max-width:96vw;padding:22px 18px;}
  .mtitle{font-size:18px;}
  .rpt-wrap{padding:16px;}
}

/* 인쇄 */
@media print{
  body{background:#fff;}
  .hdr,.cbar,.stats{display:none !important;}
  .mcontent{overflow:visible;padding:0;}
  .rpt-wrap{box-shadow:none;border:none;max-width:100%;}
}
</style>
</head>
<body>

<!-- ═══════════ LOGIN ═══════════ -->
<div id="loginScreen">
  <div class="auth-box" id="loginBox">
    <div class="auth-logo">
      <div class="auth-brand">Daesung Housing</div>
      <h1>상담 관리 시스템</h1>
      <p>지점별 상담 · 시공 통합관리</p>
    </div>
    <div class="fld">
      <label>아이디</label>
      <input id="liId" type="text" placeholder="아이디" onkeydown="if(event.key==='Enter')doLogin()">
    </div>
    <div class="fld">
      <label>비밀번호</label>
      <input id="liPw" type="password" placeholder="비밀번호" onkeydown="if(event.key==='Enter')doLogin()">
    </div>
    <div class="err" id="liErr"></div>
    <button class="btn-main" onclick="doLogin()">로그인</button>
    <div class="divider">또는</div>
    <button class="btn-sec" onclick="showPane('reg')">신규 직원 가입</button>
  </div>

  <div class="auth-box" id="regBox" style="display:none;">
    <div class="auth-logo">
      <div class="auth-brand">Daesung Housing</div>
      <h1>직원 가입</h1>
      <p>지점 영업담당 계정 등록</p>
    </div>
    <div class="fld"><label>이름</label><input id="rgName" type="text" placeholder="이름"></div>
    <div class="fld"><label>아이디</label><input id="rgId" type="text" placeholder="영문/숫자"></div>
    <div class="fld"><label>지점</label>
      <select id="rgBranch" style="width:100%;padding:10px 14px;border:1.5px solid var(--border);border-radius:var(--r);font-size:15px;font-family:inherit;"></select>
    </div>
    <div class="fld"><label>비밀번호 (6자 이상)</label><input id="rgPw" type="password"></div>
    <div class="fld"><label>비밀번호 확인</label><input id="rgPw2" type="password"></div>
    <div class="err" id="rgErr"></div>
    <button class="btn-main" onclick="doRegister()">가입하기</button>
    <button class="btn-sec" onclick="showPane('login')">로그인으로 돌아가기</button>
  </div>
</div>

<!-- ═══════════ APP ═══════════ -->
<div id="app">
  <!-- 헤더 -->
  <div class="hdr">
    <div class="hdr-logo">
      <span class="hdr-brand">상담관리</span>
      <span class="hdr-sub">대성하우징</span>
    </div>
    <div class="hdr-date-wrap">
      <span class="hdr-today-date" id="tbDate"></span>
      <span class="hdr-sync-label" id="lastSyncLabel">로컬 모드</span>
    </div>
    <div class="hdr-spacer"></div>
    <div class="hdr-right">
      <span class="sync-dot" id="syncDot" title="동기화 상태 (클릭 시 수동 동기화)" onclick="syncFromAPI()"></span>
      <span class="hdr-user-name" id="tbName"></span>
      <span class="ub" id="tbBadge"></span>
      <button class="hdr-btn" id="btnApi" style="display:none;" onclick="openApiSetup()">🔗 연동</button>
      <button class="hdr-btn" id="btnMgr" style="display:none;" onclick="openUserMgr()">👥 계정</button>
      <button class="hdr-btn" onclick="doLogout()">로그아웃</button>
    </div>
  </div>

  <!-- 컨트롤 바 -->
  <div class="cbar">
    <div class="vtabs">
      <button class="vtab on" data-v="table"    onclick="setView('table')">상담목록</button>
      <button class="vtab"     data-v="classify" onclick="setView('classify')">건수분류</button>
      <button class="vtab"     data-v="weekly"   onclick="setView('weekly')">주간보고</button>
      <button class="vtab"     data-v="monthly"  onclick="setView('monthly')">월간보고</button>
    </div>
    <div class="dnav" id="dnavWrap">
      <button class="nav-arrow" onclick="navigate(-1)">‹</button>
      <span class="dlabel" id="dlabel">전체 기간</span>
      <button class="nav-arrow" onclick="navigate(1)">›</button>
      <button class="today-btn" onclick="goToday()">오늘</button>
    </div>
    <div class="cbar-divider"></div>
    <select class="filter-sel" id="filterBranch" onchange="renderView()"></select>
    <select class="filter-sel" id="filterMgr" onchange="renderView()"></select>
    <select class="filter-sel" id="filterType" onchange="renderView()">
      <option value="">전체 고객</option>
      <option value="소비자">소비자</option>
      <option value="인테리어">인테리어(업체)</option>

<script>
// ══════════════════════════════════════════════
//  상수 / 데이터 모델
// ══════════════════════════════════════════════
const BRANCHES = ['창동점','포천점','금곡점'];
// 옛 지점명(남양주점) → 금곡점 통일. 모르는 값은 그대로 둠.
function normBranch(b){
  const s=String(b||'').trim();
  if(s==='남양주점') return '금곡점';
  return s;
}
// 진행상황 (노션 '상황' + 시트 '진행상황' 통합) — 순서 = 파이프라인 진행도
const STATUSES = [
  {key:'consult', name:'1차 상담', cls:'tag-consult', hex:'#64748b'},
  {key:'survey',  name:'실측예정/완료', cls:'tag-survey',  hex:'#0891b2'},
  {key:'quote',   name:'견적제시', cls:'tag-quote',  hex:'#0369a1'},
  {key:'pay',     name:'결제완료', cls:'tag-pay',    hex:'#7c3aed'},
  {key:'sched',   name:'시공예정', cls:'tag-sched',  hex:'#d97706'},
  {key:'done',    name:'시공완료', cls:'tag-done',   hex:'#15803d'},
  {key:'cancel',  name:'취소',     cls:'tag-cancel', hex:'#b91c1c'},
];
function statusObj(k){ return STATUSES.find(s=>s.key===k) || STATUSES[0]; }
function statusIdx(k){ const i=STATUSES.findIndex(s=>s.key===k); return i<0?0:i; }
// 유입/방문경로
const SOURCES = ['전단지','인근지역','인터넷 검색','블로그/당근','켐스콘광고','대성하우징광고','현장 방문','기타'];
// 시공 구분 (노션 욕실/싱크/기구 + 시트 욕실/주방/기구)
const CATEGORIES = ['욕실전체','욕실부분','욕실+싱크','싱크대','주방','기구설치','타일','단순판매','기타'];
const DAYS = ['일','월','화','수','목','금','토'];

function branchOptions(sel){ return BRANCHES.map(b=>`<option value="${b}"${b===sel?' selected':''}>${b}</option>`).join(''); }
function srcOptions(sel){ return '<option value="">선택</option>'+SOURCES.map(s=>`<option value="${s}"${s===sel?' selected':''}>${s}</option>`).join(''); }
function catOptions(sel){ return '<option value="">선택</option>'+CATEGORIES.map(c=>`<option value="${c}"${c===sel?' selected':''}>${c}</option>`).join(''); }
function statusOptions(sel){ return STATUSES.map(s=>`<option value="${s.key}"${s.key===sel?' selected':''}>${s.name}</option>`).join(''); }

// ── localStorage 키 ──
const UK='ds_users', RK='ds_records', SESS='ds_session', PQ_KEY='ds_pending';

// ── Google Sheets API ──
const API_URL_DEFAULT = ''; // 관리자가 연동설정에서 입력
function getApiUrl(){ return (localStorage.getItem('ds_api_url') || API_URL_DEFAULT || '').trim(); }
Object.defineProperty(window, 'API_URL', { get: getApiUrl });

let CU=null, CV='table', CD=new Date(); CD.setHours(0,0,0,0);
let editingId=null, detId=null;

// ── 유틸 ──
function g(id){ return document.getElementById(id); }
function p2(n){ return String(n).padStart(2,'0'); }
function dk(d){ return d.getFullYear()+'-'+p2(d.getMonth()+1)+'-'+p2(d.getDate()); }
function escH(s){ return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function esc(s){ return String(s==null?'':s).replace(/'/g,"\\'"); }
function uid(){ return 'r'+Date.now().toString(36)+Math.random().toString(36).slice(2,7); }
function numFmt(n){ return (Number(n)||0).toLocaleString('ko-KR'); }
function parseDate(s){ if(!s) return null; const d=new Date(s); return isNaN(d)?null:d; }
function formatRevenue(el){ const d=el.value.replace(/[^0-9]/g,''); el.value=d?Number(d).toLocaleString('ko-KR'):''; }
function showToast(msg, ok){
  const el=g('toast'); el.textContent=msg;
  el.style.background= ok===false?'#d97706':'#15803d';
  el.style.opacity='1'; clearTimeout(el._t);
  el._t=setTimeout(()=>el.style.opacity='0', 2800);
}

// ── 데이터 로드/저장 ──
function loadUsers(){ let r; try{ r=JSON.parse(localStorage.getItem(UK)||'[]'); }catch(e){ r=[]; } return Array.isArray(r)?r:[]; }
function saveUsers(u){ localStorage.setItem(UK, JSON.stringify(u)); }
function loadRecords(){ try{ const r=JSON.parse(localStorage.getItem(RK)||'[]'); return Array.isArray(r)?r:[]; }catch(e){ return []; } }
function saveRecords(r){ localStorage.setItem(RK, JSON.stringify(r)); }

// ══════════════════════════════════════════════
//  Sheets API (기존 백엔드 호환: getProjects/saveProject/deleteProject)
//  레코드는 payload(JSON)에 담아 저장 → 기존 Apps Script 그대로 사용 가능
// ══════════════════════════════════════════════
async function apiCall(params){
  if(!API_URL) return null;
  const p=Object.assign({},params,{_t:Date.now()});
  const url=API_URL+'?'+new URLSearchParams(p).toString();
  for(let a=0;a<2;a++){
    try{
      const res=await fetch(url,{cache:'no-store',redirect:'follow'});
      const text=await res.text();
      try{ return JSON.parse(text); }
      catch(e){ if(a===0){ await new Promise(r=>setTimeout(r,600)); continue; } return null; }
    }catch(e){ if(a===0){ await new Promise(r=>setTimeout(r,600)); continue; } return null; }
  }
  return null;
}
function loadPQ(){ try{ return JSON.parse(localStorage.getItem(PQ_KEY)||'[]'); }catch(e){ return []; } }
function savePQ(q){ localStorage.setItem(PQ_KEY, JSON.stringify(q)); }
function addPQ(p){ const q=loadPQ(); q.push({...p,_at:Date.now()}); savePQ(q); }
async function flushPQ(){
  const q=loadPQ(); if(!q.length) return;
  const failed=[];
  for(const p of q){ const r=await apiCall(p); if(!r||!r.ok){ if(Date.now()-(p._at||0)<3600000) failed.push(p); } }
  savePQ(failed);
}
async function apiPost(params){
  if(!API_URL) return null;
  setSync('syncing');
  const r=await apiCall(params);
  if(!r||!r.ok){ addPQ(params); setSync('warn'); } else setSync('ok');
  return r;
}
function setSync(s){
  const dot=g('syncDot'); if(!dot) return;
  const pq=loadPQ().length;
  dot.style.background= s==='syncing'?'#60a5fa':s==='warn'?'#ef4444':(pq>0?'#f59e0b':'#22c55e');
  if(s==='ok'){ const n=new Date(); g('lastSyncLabel').textContent='동기화 '+p2(n.getHours())+':'+p2(n.getMinutes()); }
}
// 레코드가 '내용 있는' 유효 데이터인지 (test1 같은 빈 껍데기 거르기)
function isValidRec(r){
  if(!r || typeof r!=='object' || !r.id) return false;
  return !!(r.client || r.date || r.mgr);
}
// 로컬 + 시트 레코드를 id 기준으로 합치기 (더 최신 updatedAt 우선, 빈 데이터 무시)
function mergeRecords(localArr, remoteArr){
  const map={};
  const put=(r)=>{
    if(!isValidRec(r)) return;
    const ex=map[r.id];
    if(!ex){ map[r.id]=r; return; }
    const a=ex.updatedAt||'', b=r.updatedAt||'';
    if(b>=a) map[r.id]=r;
  };
  (localArr||[]).forEach(put);
  (remoteArr||[]).forEach(put);
  return Object.values(map);
}
async function syncFromAPI(){
  if(!API_URL){ showToast('로컬 모드 — 시트 미연결'); return; }
  setSync('syncing');
  await flushPQ();
  const [pRes,uRes]=await Promise.all([ apiCall({action:'getProjects'}), apiCall({action:'getUsers'}) ]);
  if(uRes&&uRes.ok&&uRes.users&&uRes.users.length && loadPQ().length===0) saveUsers(uRes.users);
  if(pRes&&pRes.ok&&Array.isArray(pRes.projects)){
    const remote=pRes.projects.map(p=>{
      if(p && p._rec){ try{ return JSON.parse(p._rec); }catch(e){} }
      return p;
    });
    const merged=mergeRecords(loadRecords(), remote);
    saveRecords(merged);
  }
  setSync('ok'); await migrateBranches(); rebuildFilters(); renderView();
}

// ══════════════════════════════════════════════
//  세션 / 인증
// ══════════════════════════════════════════════
const FIXED_USERS=[
  {id:'admin', name:'관리자', pw:'0178', role:'admin', branch:''},
];
function saveSession(u){ localStorage.setItem(SESS, JSON.stringify({id:u.id,at:Date.now()})); }
function clearSession(){ localStorage.removeItem(SESS); }
async function restoreSession(){
  const raw=localStorage.getItem(SESS); if(!raw) return;
  try{
    const s=JSON.parse(raw);
    if(Date.now()-s.at > 7*864e5){ clearSession(); return; }
    let u=FIXED_USERS.find(x=>x.id===s.id)||loadUsers().find(x=>x.id===s.id);
    if(!u&&API_URL){ const r=await apiCall({action:'getUsers'}); if(r&&r.ok){ saveUsers(r.users); u=r.users.find(x=>x.id===s.id);} }
    if(!u){ clearSession(); return; }
    CU=u; startApp();
  }catch(e){ clearSession(); }
}
async function doLogin(){
  const id=g('liId').value.trim(), pw=g('liPw').value;
  let u=FIXED_USERS.find(x=>x.id===id&&x.pw===pw) || loadUsers().find(x=>x.id===id&&x.pw===pw);
  if(!u&&API_URL){ const r=await apiCall({action:'getUsers'}); if(r&&r.ok&&r.users.length) saveUsers(r.users); u=loadUsers().find(x=>x.id===id&&x.pw===pw); }
  if(!u){ g('liErr').textContent='아이디 또는 비밀번호가 올바르지 않습니다.'; return; }
  localStorage.setItem('ds_saved_id',id);
  CU=u; saveSession(u); startApp();
}
async function doRegister(){
  const name=g('rgName').value.trim(), id=g('rgId').value.trim();
  const branch=g('rgBranch').value.trim(), pw=g('rgPw').value, pw2=g('rgPw2').value;
  if(!name||!id||!pw||!pw2){ g('rgErr').textContent='모든 항목을 입력해 주세요.'; return; }
  if(pw.length<6){ g('rgErr').textContent='비밀번호는 6자 이상이어야 합니다.'; return; }
  if(pw!==pw2){ g('rgErr').textContent='비밀번호가 일치하지 않습니다.'; return; }
  const users=loadUsers();
  if(users.find(u=>u.id===id)){ g('rgErr').textContent='이미 사용 중인 아이디입니다.'; return; }
  const nu={id,name,pw,role:'sales',branch};
  users.push(nu); saveUsers(users);
  const r=await apiPost({action:'addUser',id,name,pw,role:'sales',branch});
  if(!r||!r.ok) showToast('서버 동기화 실패 — 다른 기기에서 로그인이 안 될 수 있습니다.', false);
  CU=nu; saveSession(nu); startApp();
}
function doLogout(){
  CU=null; clearSession();
  g('app').classList.remove('on'); g('loginScreen').style.display='';
  g('liId').value=''; g('liPw').value=''; showPane('login');
}
function showPane(p){
  g('loginBox').style.display=p==='login'?'':'none';
  g('regBox').style.display=p==='reg'?'':'none';
}

// ══════════════════════════════════════════════
//  앱 시작
// ══════════════════════════════════════════════
function startApp(){
  g('loginScreen').style.display='none';
  g('app').classList.add('on');
  g('tbName').textContent=CU.name;
  const b=g('tbBadge');
  b.textContent= CU.role==='admin'?'관리자':CU.role==='manager'?'관리자':'영업직원';
  b.className='ub '+(CU.role==='sales'?'sales':'manager');
  const t=new Date();
  g('tbDate').textContent=t.getFullYear()+'년 '+(t.getMonth()+1)+'월 '+t.getDate()+'일 ('+DAYS[t.getDay()]+')';
  g('btnMgr').style.display=CU.role==='admin'?'':'none';
  g('btnApi').style.display=CU.role==='admin'?'':'none';
  // 모달 셀렉트 초기화
  g('rgBranch').innerHTML=branchOptions();
  g('umBranch').innerHTML=branchOptions();
  g('emBranch').innerHTML=branchOptions();
  g('emSource').innerHTML=srcOptions();
  g('emCat').innerHTML=catOptions();
  g('emStatus').innerHTML=statusOptions();
  // 진행상황 필터
  g('filterStatus').innerHTML='<option value="">전체 진행상황</option>'+STATUSES.map(s=>`<option value="${s.key}">${s.name}</option>`).join('');
  migrateBranches();
  rebuildFilters(); renderView();
  if(API_URL) syncFromAPI();
}
// 남양주점 → 금곡점 일괄 정규화 (레코드·계정). 변경분은 서버에도 반영.
async function migrateBranches(){
  let changed=false;
  const rs=loadRecords();
  const dirty=[];
  for(const r of rs){
    const nb=normBranch(r.branch);
    if(r.branch && nb && nb!==r.branch){ r.branch=nb; r.updatedAt=new Date().toISOString(); changed=true; dirty.push(r); }
  }
  if(changed){
    saveRecords(rs);
    if(API_URL){ for(const r of dirty){ apiPost({action:'saveProject', payload:JSON.stringify({id:r.id, name:r.client, branch:r.branch, mgr:r.mgr, _rec:JSON.stringify(r)})}); } }
  }
  let uChanged=false;
  const us=loadUsers();
  for(const u of us){
    const nb=normBranch(u.branch);
    if(u.branch && nb && nb!==u.branch){ u.branch=nb; uChanged=true;
      if(API_URL) apiPost({action:'addUser',id:u.id,name:u.name,pw:u.pw,role:u.role||'sales',branch:nb}); }
  }
  if(uChanged) saveUsers(us);
  // 현재 로그인 사용자 본인 지점도 갱신
  if(CU && CU.branch){ const nb=normBranch(CU.branch); if(nb!==CU.branch) CU.branch=nb; }
}

// ── 필터 ──
function rebuildFilters(){
  let rs=loadRecords();
  const isSales = CU && CU.role==='sales' && CU.branch;
  if(isSales) rs=rs.filter(r=>r.branch===CU.branch);
  const mgrs=[...new Set(rs.map(r=>r.mgr).filter(Boolean))].sort();
  const fb=g('filterBranch'), fm=g('filterMgr');
  const bVal=fb.value, mVal=fm.value;
  if(isSales){
    // 영업직원: 본인 지점만 — 드롭다운 고정·비활성화
    fb.innerHTML=`<option value="${escH(CU.branch)}">${escH(CU.branch)}</option>`;
    fb.value=CU.branch; fb.disabled=true;
  }else{
    fb.innerHTML='<option value="">전체 지점</option>'+BRANCHES.map(b=>`<option value="${escH(b)}">${escH(b)}</option>`).join('');
    fb.value=bVal; fb.disabled=false;
  }
  fm.innerHTML='<option value="">전체 담당자</option>'+mgrs.map(m=>`<option value="${escH(m)}">${escH(m)}</option>`).join('');
  fm.value=mVal;
}
function filteredRecords(){
  const fb=g('filterBranch').value, fm=g('filterMgr').value;
  const ft=g('filterType').value, fs=g('filterStatus').value;
  const q=g('searchInp').value.trim().toLowerCase();
  let rs=loadRecords();
  // 영업직원은 본인 지점만 (관리자/매니저는 전체)
  if(CU && CU.role==='sales' && CU.branch) rs=rs.filter(r=>r.branch===CU.branch);
  if(fb) rs=rs.filter(r=>r.branch===fb);
  if(fm) rs=rs.filter(r=>r.mgr===fm);
  if(ft) rs=rs.filter(r=>r.type===ft);
  if(fs) rs=rs.filter(r=>r.status===fs);
  if(q) rs=rs.filter(r=>((r.client||'')+(r.addr||'')+(r.phone||'')).toLowerCase().includes(q));
  return rs.sort((a,b)=>(b.date||'').localeCompare(a.date||''));
}
// 권한 적용된 기본 레코드 집합 (지점 격리 — 보고서/분류 공통)
function scopedRecords(){
  let rs=loadRecords();
  if(CU && CU.role==='sales' && CU.branch) rs=rs.filter(r=>r.branch===CU.branch);
  return rs;
}
// 기간 범위 필터 (주간/월간 보고용) — 영업직원 지점 격리 포함
function recordsInRange(start, end){
  return scopedRecords().filter(r=>{
    const d=parseDate(r.date); if(!d) return false;
    d.setHours(0,0,0,0);
    return d.getTime()>=start.getTime() && d.getTime()<=end.getTime();
  });
}
function weekStart(d){ const day=d.getDay(), diff=day===0?-6:1-day; const m=new Date(d); m.setDate(d.getDate()+diff); m.setHours(0,0,0,0); return m; }

//  뷰 전환

function setView(v){
  CV=v;
  document.querySelectorAll('.vtab').forEach(t=>t.classList.toggle('on',t.dataset.v===v));
  const showNav=(v==='weekly'||v==='monthly');
  g('dnavWrap').style.opacity=showNav?'1':'.4';
  g('dnavWrap').style.pointerEvents=showNav?'auto':'none';
  // PDF 보고서 버튼은 주간/월간에서만
  g('btnPdfReport').style.display=showNav?'':'none';
  renderView();
}
function navigate(dir){
  const d=new Date(CD);
  if(CV==='weekly') d.setDate(d.getDate()+dir*7); else d.setMonth(d.getMonth()+dir);
  CD=d; renderView();
}
function goToday(){ CD=new Date(); CD.setHours(0,0,0,0); renderView(); }
function renderView(){
  updateLabel();
  const el=g('mc');
  g('statsBar').style.display = (CV==='table'||CV==='classify')?'grid':'none';
  if(CV==='table'||CV==='classify') g('statsBar').innerHTML=statsHtml(filteredRecords());

}
function updateLabel(){
  const el=g('dlabel'), d=CD;
  if(CV==='weekly'){ const s=weekStart(d), e=new Date(s); e.setDate(s.getDate()+6); el.textContent=(s.getMonth()+1)+'/'+s.getDate()+' ~ '+(e.getMonth()+1)+'/'+e.getDate(); }
  else if(CV==='monthly'){ el.textContent=d.getFullYear()+'년 '+(d.getMonth()+1)+'월'; }
  else el.textContent='전체 기간';
}

// ── 통계 박스 ──
function statsHtml(rs){
  const total=rs.length;
  const cnt=k=>rs.filter(r=>r.status===k).length;
  const sumRev=arr=>arr.reduce((s,r)=>s+(Number(r.revenue)||0),0);
  const paidRecs=rs.filter(r=>['pay','sched','done'].includes(r.status));
  const boxes=[
    {cls:'gray',   label:'전체 상담', cnt:total, amt:''},
    {cls:'cyan',   label:'실측',  cnt:cnt('survey'), amt:''},
    {cls:'blue',   label:'견적',  cnt:cnt('quote'), amt:''},
    {cls:'purple', label:'결제완료', cnt:cnt('pay'), amt:numFmt(sumRev(rs.filter(r=>r.status==='pay')))+'원'},
    {cls:'amber',  label:'시공예정', cnt:cnt('sched'), amt:''},
    {cls:'green',  label:'시공완료', cnt:cnt('done'), amt:numFmt(sumRev(rs.filter(r=>r.status==='done')))+'원'},
  ];
  const head=`<div style="grid-column:1/-1;font-size:12px;color:var(--text3);font-weight:700;margin-bottom:-2px;">계약매출(결제+시공) 합계: ${numFmt(sumRev(paidRecs))}원 · ${paidRecs.length}건</div>`;
  return head+boxes.map(b=>`<div class="stat-box ${b.cls}">
    <div class="stat-label">${b.label}</div>
    <div class="stat-cnt">${b.cnt}<small>건</small></div>
    ${b.amt?`<div class="stat-amt">${b.amt}</div>`:''}
  </div>`).join('');
}

// ── 건수분류 (차트) ──
function classifyBlock(title, ico, counts, colorFn){
  const entries=Object.entries(counts).filter(([k,v])=>v>0).sort((a,b)=>b[1]-a[1]);
  const max=Math.max(1,...entries.map(e=>e[1]));
  const total=entries.reduce((s,e)=>s+e[1],0);
  const bars=entries.map(([k,v])=>{
    const pct=Math.round(v/max*100), share=total?Math.round(v/total*100):0;
    const col=colorFn?colorFn(k):'#1d5fd8';
    return `<div class="bar-row">
      <div class="bar-label" title="${escH(k)}">${escH(k)}</div>
      <div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:${col};">${share}%</div></div>
      <div class="bar-cnt">${v}<small>건</small></div>
    </div>`;
  }).join('') || `<div style="color:var(--text3);font-size:13px;padding:8px 0;">데이터 없음</div>`;
  return `<div class="cls-card"><div class="cls-title"><span class="ico">${ico}</span>${title}</div>${bars}</div>`;
}
function renderClassify(){
  const rs=filteredRecords();
  if(!rs.length) return `<div style="text-align:center;padding:50px;color:var(--text3);">분류할 상담 데이터가 없습니다.</div>`;
  const tally=(field)=>{ const o={}; rs.forEach(r=>{ const v=r[field]||'미지정'; o[v]=(o[v]||0)+1; }); return o; };
  // 진행상황은 정의 순서대로
  const statusCounts={}; STATUSES.forEach(s=>{ const c=rs.filter(r=>r.status===s.key).length; if(c) statusCounts[s.name]=c; });
  return `<div class="cls-grid">
    ${classifyBlock('고객유형별', '👤', tally('type'), k=>k==='인테리어'?'#d97706':'#0369a1')}
    ${classifyBlock('진행상황별', '📊', statusCounts, k=>{ const s=STATUSES.find(x=>x.name===k); return s?s.hex:'#64748b'; })}
    ${classifyBlock('유입경로별', '📍', tally('source'), ()=>'#0891b2')}
    ${classifyBlock('시공구분별', '🛠', tally('cat'), ()=>'#7c3aed')}
    ${classifyBlock('지점별', '🏢', tally('branch'), ()=>'#1e3560')}
    ${classifyBlock('담당자별', '🙋', tally('mgr'), ()=>'#15803d')}
  </div>`;
}

// ══════════════════════════════════════════════
//  보고서 (주간 / 월간)
// ══════════════════════════════════════════════
// ── 매출/건수 공통 집계 ──
function sumRevArr(arr){ return arr.reduce((s,r)=>s+(Number(r.revenue)||0),0); }
function buckets(arr){
  // 상담(전체) / 계약(결제+시공예정+완료) / 진행중(계약−완공) / 완공 / 취소
  const con=arr.filter(r=>['pay','sched','done'].includes(r.status));
  const done=arr.filter(r=>r.status==='done');
  const prog=arr.filter(r=>['pay','sched'].includes(r.status));
  const cancel=arr.filter(r=>r.status==='cancel');
  const active=arr.filter(r=>r.status!=='cancel');
  return {
    consultCnt:active.length, consultAmt:sumRevArr(active),
    conCnt:con.length, conAmt:sumRevArr(con),
    progCnt:prog.length, progAmt:sumRevArr(prog),
    doneCnt:done.length, doneAmt:sumRevArr(done),
    cancelCnt:cancel.length,
    rate: active.length?Math.round(con.length/active.length*100):0,
  };
}
const RPT_COLS=[
  {k:'consult', l:'상담'}, {k:'con', l:'계약'}, {k:'prog', l:'진행중'}, {k:'done', l:'완공'},
];
function cellMaCnt(amt,cnt){ return `${numFmt(amt)}<span style="color:#94a3b8;font-size:11px;"> (${cnt})</span>`; }

// ── 진행상황별 분포표 ──
function reportTable(rs){
  let body=STATUSES.map(s=>{
    const arr=rs.filter(r=>r.status===s.key);
    return `<tr><td class="lft"><span class="tag ${s.cls}">${s.name}</span></td><td>${arr.length}</td><td>${numFmt(sumRevArr(arr))}</td></tr>`;
  }).join('');
  body+=`<tr class="sum"><td class="lft">합계</td><td>${rs.length}</td><td>${numFmt(sumRevArr(rs))}</td></tr>`;
  return `<table class="rpt-table"><thead><tr><th style="text-align:left;">진행상황</th><th>건수</th><th>금액(원)</th></tr></thead><tbody>${body}</tbody></table>`;
}

// ── 지점 → 개인 2단계 종합표 (싱크팀 양식) ──
function reportCombinedTable(rs){
  // 지점별 그룹
  const bGroups={}; rs.forEach(r=>{ const k=r.branch||'미지정'; (bGroups[k]=bGroups[k]||[]).push(r); });
  const bKeys=Object.keys(bGroups).sort();
  const colHead=RPT_COLS.map(c=>`<th>${c.l}<div style="font-size:9px;font-weight:600;color:#c7d2e8;">매출(건수)</div></th>`).join('');
  let rows='';
  bKeys.forEach(bk=>{
    const bArr=bGroups[bk];
    const bb=buckets(bArr);
    // 지점 요약 행 (강조)
    rows+=`<tr class="br-row"><td class="lft">🏢 ${escH(bk)}</td>`;
    RPT_COLS.forEach(c=>rows+=`<td>${cellMaCnt(bb[c.k+'Amt'],bb[c.k+'Cnt'])}</td>`);
    rows+=`<td>${bb.rate}%</td></tr>`;
    // 지점 내 개인별 세부
    const mGroups={}; bArr.forEach(r=>{ const n=r.mgr||'미지정'; (mGroups[n]=mGroups[n]||[]).push(r); });
    Object.keys(mGroups).sort((a,b)=>buckets(mGroups[b]).conCnt-buckets(mGroups[a]).conCnt).forEach(mk=>{
      const mb=buckets(mGroups[mk]);
      rows+=`<tr class="mg-row"><td class="lft" style="padding-left:26px;color:#475569;">└ ${escH(mk)}</td>`;
      RPT_COLS.forEach(c=>rows+=`<td>${cellMaCnt(mb[c.k+'Amt'],mb[c.k+'Cnt'])}</td>`);
      rows+=`<td>${mb.rate}%</td></tr>`;
    });
  });
  // 전체 합계
  const tot=buckets(rs);
  rows+=`<tr class="sum"><td class="lft">전체 합계</td>`;
  RPT_COLS.forEach(c=>rows+=`<td>${cellMaCnt(tot[c.k+'Amt'],tot[c.k+'Cnt'])}</td>`);
  rows+=`<td>${tot.rate}%</td></tr>`;
  return `<table class="rpt-table rpt-combined"><thead><tr><th style="text-align:left;">지점 / 담당자</th>${colHead}<th>전환율</th></tr></thead><tbody>${rows}</tbody></table>
    <div style="font-size:11px;color:var(--text3);margin-top:6px;">※ 상담=취소 제외 전체 · 계약=결제완료 이상 누적 · 진행중=결제+시공예정 · 완공=시공완료 · 각 칸은 매출(건수)</div>`;
}

// ── 개인별 전체 랭킹 (관리자 전용, 지점 무관 통합) ──
function reportMgrRanking(rs){
  const mGroups={}; rs.forEach(r=>{ const n=r.mgr||'미지정'; (mGroups[n]=mGroups[n]||[]).push(r); });
  const list=Object.keys(mGroups).map(m=>{
    const b=buckets(mGroups[m]);
    return {m, branch:[...new Set(mGroups[m].map(r=>r.branch))].join(','), ...b};
  }).sort((a,b)=>b.conAmt-a.conAmt || b.conCnt-a.conCnt);
  const rows=list.map((x,i)=>`<tr>
    <td style="font-weight:800;color:${i<3?'#b45309':'#94a3b8'};">${i+1}</td>
    <td class="lft" style="font-weight:700;">${escH(x.m)}</td>
    <td style="font-size:11px;color:#64748b;">${escH(x.branch)}</td>
    <td>${x.consultCnt}</td><td>${x.conCnt}</td><td>${x.rate}%</td><td>${x.doneCnt}</td>
    <td style="font-weight:700;">${numFmt(x.conAmt)}</td></tr>`).join('') || '<tr><td colspan="8" style="color:#94a3b8;">데이터 없음</td></tr>';
  return `<table class="rpt-table"><thead><tr><th>순위</th><th style="text-align:left;">담당자</th><th>지점</th><th>상담</th><th>계약</th><th>전환율</th><th>완공</th><th>계약매출(원)</th></tr></thead><tbody>${rows}</tbody></table>`;
}

function buildReport(rs, periodLabel){
  const con=rs.filter(r=>['pay','sched','done'].includes(r.status));
  const done=rs.filter(r=>r.status==='done');
  const active=rs.filter(r=>r.status!=='cancel');
  const consumer=rs.filter(r=>r.type!=='인테리어'&&r.status!=='cancel').length;
  const inter=rs.filter(r=>r.type==='인테리어'&&r.status!=='cancel').length;
  const rate=active.length?Math.round(con.length/active.length*100):0;
  const fb=g('filterBranch').value, fm=g('filterMgr').value;
  const isAdmin = CU && (CU.role==='admin'||CU.role==='manager');
  const scope=[fb,fm].filter(Boolean).join(' · ') || (isAdmin?'대성하우징 전체':(CU&&CU.branch)||'전체');
  // 관리자 전용 전체 랭킹 섹션
  const rankingSec = (isAdmin && !fb && !fm)
    ? `<div class="rpt-sec"><h3>개인별 전체 실적 랭킹 (전 지점 통합)</h3>${reportMgrRanking(rs)}</div>` : '';
  return `<div class="rpt-wrap" id="rptArea">
    <div class="rpt-head">
      <h2>대성하우징 ${CV==='weekly'?'주간':'월간'} 상담 보고서</h2>
      <p>${escH(periodLabel)} · 대상: ${escH(scope)} · 작성일 ${dk(new Date())}${isAdmin?' · 작성자 '+escH(CU.name):''}</p>
    </div>
    <div class="rpt-sec">
      <h3>핵심 지표</h3>
      <div class="rpt-kpi">
        <div class="rpt-kpi-box"><div class="k">전체 상담</div><div class="v">${active.length}<span style="font-size:13px;">건</span></div><div class="vs">소비자 ${consumer} · 업체 ${inter}</div></div>
        <div class="rpt-kpi-box"><div class="k">계약(결제이상)</div><div class="v">${con.length}<span style="font-size:13px;">건</span></div><div class="vs">전환율 ${rate}%</div></div>
        <div class="rpt-kpi-box"><div class="k">시공완료</div><div class="v">${done.length}<span style="font-size:13px;">건</span></div><div class="vs">완공매출 ${numFmt(sumRevArr(done))}원</div></div>
        <div class="rpt-kpi-box"><div class="k">계약매출</div><div class="v" style="font-size:18px;">${numFmt(sumRevArr(con))}<span style="font-size:12px;">원</span></div><div class="vs">결제+시공 기준</div></div>
      </div>
    </div>
    <div class="rpt-sec"><h3>지점별 · 개인별 종합 ${isAdmin?'(전 지점)':''}</h3>${reportCombinedTable(rs)}</div>
    ${rankingSec}
    <div class="rpt-sec"><h3>진행상황별 분포</h3>${reportTable(rs)}</div>
    <div class="rpt-sec"><h3>주요 상담 내역</h3>${reportDetailRows(rs)}</div>
  </div>`;
}
function reportDetailRows(rs){
  const top=rs.slice().sort((a,b)=>(b.revenue||0)-(a.revenue||0)).slice(0,15);
  if(!top.length) return '<div style="color:#94a3b8;font-size:13px;">내역 없음</div>';
  const rows=top.map(r=>{
    const st=statusObj(r.status);
    return `<tr><td>${escH(r.date||'')}</td><td class="lft">${escH(r.client||'')}</td><td>${escH(r.branch||'')}</td><td>${escH(r.mgr||'')}</td><td><span class="tag ${st.cls}">${st.name}</span></td><td>${r.revenue?numFmt(r.revenue):'-'}</td></tr>`;
  }).join('');
  return `<table class="rpt-table"><thead><tr><th>상담일</th><th style="text-align:left;">고객</th><th>지점</th><th>담당</th><th>진행</th><th>금액</th></tr></thead><tbody>${rows}</tbody></table>`;
}
// 현재 보고서 탭의 기간·필터가 반영된 레코드 + 기간라벨 반환 (화면/PDF 공통)
function currentReportScope(){
  let s, e, label;
  if(CV==='weekly'){
    s=weekStart(CD); e=new Date(s); e.setDate(s.getDate()+6);
    label=`${s.getFullYear()}.${s.getMonth()+1}.${s.getDate()} ~ ${e.getMonth()+1}.${e.getDate()}`;
  }else{
    s=new Date(CD.getFullYear(),CD.getMonth(),1); e=new Date(CD.getFullYear(),CD.getMonth()+1,0);
    s.setHours(0,0,0,0); e.setHours(0,0,0,0);
    label=`${CD.getFullYear()}년 ${CD.getMonth()+1}월`;
  }
  let rs=recordsInRange(s,e);
  const fb=g('filterBranch').value, fm=g('filterMgr').value, ft=g('filterType').value;
  if(fb) rs=rs.filter(r=>r.branch===fb);
  if(fm) rs=rs.filter(r=>r.mgr===fm);
  if(ft) rs=rs.filter(r=>r.type===ft);
  return {rs, label};
}
function renderWeekly(d){ const sc=currentReportScope(); return buildReport(sc.rs, sc.label); }
function renderMonthly(d){ const sc=currentReportScope(); return buildReport(sc.rs, sc.label); }

// ── PDF 보고서 (싱크팀 방식: 별도 인쇄창 → Save as PDF) ──
function printReport(){
  const {rs, label}=currentReportScope();
  if(!rs.length){ showToast('해당 기간에 보고할 상담이 없습니다.', false); return; }
  const isAdmin = CU && (CU.role==='admin'||CU.role==='manager');
  const fb=g('filterBranch').value, fm=g('filterMgr').value;
  const scope=[fb,fm].filter(Boolean).join(' · ') || (isAdmin?'대성하우징 전체':(CU&&CU.branch)||'전체');
  const periodType = CV==='weekly'?'주간':'월간';
  const today=new Date();
  const todayStr=today.getFullYear()+'.'+p2(today.getMonth()+1)+'.'+p2(today.getDate());

  const con=rs.filter(r=>['pay','sched','done'].includes(r.status));
  const done=rs.filter(r=>r.status==='done');
  const active=rs.filter(r=>r.status!=='cancel');
  const consumer=rs.filter(r=>r.type!=='인테리어'&&r.status!=='cancel').length;
  const inter=rs.filter(r=>r.type==='인테리어'&&r.status!=='cancel').length;
  const rate=active.length?Math.round(con.length/active.length*100):0;

  // ① 지점→개인 2단계 종합표 (인쇄용)
  const bGroups={}; rs.forEach(r=>{ const k=r.branch||'미지정'; (bGroups[k]=bGroups[k]||[]).push(r); });
  const cellMC=(a,c)=>`${numFmt(a)}<span class="cnt"> (${c})</span>`;
  let combRows='';
  Object.keys(bGroups).sort().forEach(bk=>{
    const bArr=bGroups[bk], bb=buckets(bArr);
    combRows+=`<tr class="br"><td class="l">🏢 ${escH(bk)}</td>`;
    RPT_COLS.forEach(c=>combRows+=`<td>${cellMC(bb[c.k+'Amt'],bb[c.k+'Cnt'])}</td>`);
    combRows+=`<td>${bb.rate}%</td></tr>`;
    const mG={}; bArr.forEach(r=>{ const n=r.mgr||'미지정'; (mG[n]=mG[n]||[]).push(r); });
    Object.keys(mG).sort((a,b)=>buckets(mG[b]).conCnt-buckets(mG[a]).conCnt).forEach(mk=>{
      const mb=buckets(mG[mk]);
      combRows+=`<tr class="mg"><td class="l" style="padding-left:24px;">└ ${escH(mk)}</td>`;
      RPT_COLS.forEach(c=>combRows+=`<td>${cellMC(mb[c.k+'Amt'],mb[c.k+'Cnt'])}</td>`);
      combRows+=`<td>${mb.rate}%</td></tr>`;
    });
  });
  const tot=buckets(rs);
  combRows+=`<tr class="all"><td class="l">전체 합계</td>`;
  RPT_COLS.forEach(c=>combRows+=`<td>${cellMC(tot[c.k+'Amt'],tot[c.k+'Cnt'])}</td>`);
  combRows+=`<td>${tot.rate}%</td></tr>`;
  const combHead=RPT_COLS.map(c=>`<th>${c.l}<span class="sub">매출 (건수)</span></th>`).join('');

  // ② 개인별 전체 랭킹 (관리자·필터 미적용 시)
  let rankSec='';
  if(isAdmin && !fb && !fm){
    const mG={}; rs.forEach(r=>{ const n=r.mgr||'미지정'; (mG[n]=mG[n]||[]).push(r); });
    const list=Object.keys(mG).map(mm=>({m:mm, branch:[...new Set(mG[mm].map(r=>r.branch))].join(','), ...buckets(mG[mm])}))
      .sort((a,b)=>b.conAmt-a.conAmt||b.conCnt-a.conCnt);
    const rr=list.map((x,i)=>`<tr><td>${i+1}</td><td class="l">${escH(x.m)}</td><td>${escH(x.branch)}</td><td>${x.consultCnt}</td><td>${x.conCnt}</td><td>${x.rate}%</td><td>${x.doneCnt}</td><td class="num">${numFmt(x.conAmt)}</td></tr>`).join('');
    rankSec=`<h2>② 개인별 전체 실적 랭킹 (전 지점 통합)</h2>
      <table class="d"><thead><tr><th>순위</th><th class="l">담당자</th><th>지점</th><th>상담</th><th>계약</th><th>전환율</th><th>완공</th><th>계약매출</th></tr></thead><tbody>${rr}</tbody></table>`;
  }

  // ③ 진행상황별 분포
  let statRows=STATUSES.map(s=>{ const arr=rs.filter(r=>r.status===s.key); return `<tr><td class="l">${s.name}</td><td>${arr.length}</td><td class="num">${numFmt(sumRevArr(arr))}</td></tr>`; }).join('');
  statRows+=`<tr class="all"><td class="l">합계</td><td>${rs.length}</td><td class="num">${numFmt(sumRevArr(rs))}</td></tr>`;

  // ④ 상세 내역 (지점→담당자→상담일 정렬)
  const detail=rs.slice().sort((a,b)=>(a.branch||'').localeCompare(b.branch||'')||(a.mgr||'').localeCompare(b.mgr||'')||(b.date||'').localeCompare(a.date||''));
  const detRows=detail.map(r=>`<tr>
    <td>${escH(r.date||'')}</td><td>${escH(r.branch||'')}</td><td>${escH(r.mgr||'')}</td>
    <td>${escH(r.type||'')}</td><td class="l">${escH(r.client||'')}</td>
    <td>${escH(r.source||'')}</td><td>${escH(r.cat||'')}</td><td>${statusObj(r.status).name}</td>
    <td class="num">${r.revenue?numFmt(r.revenue):'-'}</td><td class="l note">${escH(r.note||'')}</td></tr>`).join('');

  const seq = (isAdmin && !fb && !fm) ? {comb:'①',rank:'②',stat:'③',det:'④'} : {comb:'①',stat:'②',det:'③'};
  const statNo = rankSec ? '③' : '②';
  const detNo = rankSec ? '④' : '③';

  const css=`
    *{box-sizing:border-box;-webkit-print-color-adjust:exact;print-color-adjust:exact;}
    body{font-family:'Malgun Gothic','맑은 고딕',sans-serif;color:#1e293b;margin:0;padding:26px 30px;font-size:12px;}
    h1{font-size:20px;margin:0 0 2px;color:#1e3560;}
    .meta{color:#64748b;font-size:12px;margin-bottom:16px;}
    h2{font-size:14px;color:#1e3560;margin:18px 0 8px;border-left:4px solid #1e3560;padding-left:8px;}
    .kpi{display:flex;gap:10px;margin-bottom:6px;}
    .kpi-box{flex:1;border:1px solid #d6dce8;border-radius:8px;padding:9px 12px;background:#fbfcfe;}
    .kpi-box .k{font-size:11px;color:#64748b;font-weight:700;}
    .kpi-box .v{font-size:18px;font-weight:800;color:#1e3560;margin-top:2px;}
    .kpi-box .vs{font-size:10px;color:#94a3b8;}
    table{width:100%;border-collapse:collapse;font-size:11px;margin-bottom:6px;table-layout:fixed;}
    th,td{border:1px solid #d6dce8;padding:6px 8px;text-align:right;vertical-align:middle;word-break:keep-all;}
    th{background:#1e3560;color:#fff;font-weight:700;white-space:nowrap;text-align:center;}
    th.l,td.l{text-align:left;} td.num{text-align:right;font-weight:700;}
    .sub{font-size:8.5px;font-weight:600;display:block;color:#c7d2e8;}
    .cnt{color:#94a3b8;}
    table.c tr.br td{background:#e8eef9;color:#1e3560;font-weight:800;border-top:2px solid #c7d9f5;}
    table.c tr.mg td{background:#fff;}
    table.c tr.all td{background:#dfe8f6;color:#1e3560;font-weight:800;border-top:2px solid #1e3560;}
    table.d th{background:#eef3fb;color:#334155;}
    table.d tr:nth-child(even) td{background:#f7f9fc;}
    table.d td.note{font-size:9.5px;color:#475569;white-space:normal;word-break:break-all;}
    table.s tr.all td{background:#dfe8f6;color:#1e3560;font-weight:800;}
    @media print{ @page{margin:13mm;} body{padding:0;} h2{break-after:avoid;} tr{break-inside:avoid;}
      *{-webkit-print-color-adjust:exact !important;print-color-adjust:exact !important;} }
  `;
  const html=`<!doctype html><html><head><meta charset="utf-8"><title>대성하우징 ${periodType} 보고서 ${label}</title><style>${css}</style></head><body>
    <h1>대성하우징 ${periodType} 상담 보고서</h1>
    <div class="meta">기간: <b>${escH(label)}</b> &nbsp;|&nbsp; 대상: ${escH(scope)} &nbsp;|&nbsp; 출력일: ${todayStr} &nbsp;|&nbsp; 작성자: ${escH(CU.name)} &nbsp;|&nbsp; 대상 ${active.length}건</div>
    <div class="kpi">
      <div class="kpi-box"><div class="k">전체 상담</div><div class="v">${active.length}건</div><div class="vs">소비자 ${consumer} · 업체 ${inter}</div></div>
      <div class="kpi-box"><div class="k">계약</div><div class="v">${con.length}건</div><div class="vs">전환율 ${rate}%</div></div>
      <div class="kpi-box"><div class="k">시공완료</div><div class="v">${done.length}건</div><div class="vs">완공 ${numFmt(sumRevArr(done))}원</div></div>
      <div class="kpi-box"><div class="k">계약매출</div><div class="v" style="font-size:15px;">${numFmt(sumRevArr(con))}원</div><div class="vs">결제+시공 기준</div></div>
    </div>
    <h2>① 지점별 · 개인별 종합</h2>
    <table class="c"><colgroup><col style="width:24%"><col style="width:17%"><col style="width:17%"><col style="width:17%"><col style="width:15%"><col style="width:10%"></colgroup>
      <thead><tr><th class="l">지점 / 담당자</th>${combHead}<th>전환율</th></tr></thead><tbody>${combRows}</tbody></table>
    <div style="font-size:10px;color:#94a3b8;margin-bottom:4px;">※ 상담=취소 제외 · 계약=결제완료 이상 누적 · 진행중=결제+시공예정 · 완공=시공완료 · 각 칸 매출(건수)</div>
    ${rankSec}
    <h2>${statNo} 진행상황별 분포</h2>
    <table class="s"><colgroup><col style="width:40%"><col style="width:25%"><col style="width:35%"></colgroup>
      <thead><tr><th class="l">진행상황</th><th>건수</th><th>금액(원)</th></tr></thead><tbody>${statRows}</tbody></table>
    <h2>${detNo} 상세 상담 내역 (${detail.length}건)</h2>
    <table class="d"><colgroup><col style="width:8%"><col style="width:8%"><col style="width:7%"><col style="width:7%"><col style="width:13%"><col style="width:9%"><col style="width:8%"><col style="width:8%"><col style="width:9%"><col style="width:15%"></colgroup>
      <thead><tr><th>상담일</th><th>지점</th><th>담당</th><th>유형</th><th class="l">고객</th><th>유입</th><th>시공구분</th><th>진행</th><th>금액</th><th class="l">비고</th></tr></thead>
      <tbody>${detRows||'<tr><td colspan="10" style="text-align:center;color:#94a3b8;">대상 없음</td></tr>'}</tbody></table>
  </body></html>`;

  const w=window.open('','_printRpt','width=1100,height=800');
  if(!w){ showToast('팝업이 차단되었습니다. 팝업 허용 후 다시 시도하세요.', false); return; }
  w.document.write(html); w.document.close(); w.focus();
  setTimeout(()=>{ w.print(); }, 400);
}

function openAdd(){
  editingId=null;
  g('emTitle').textContent='상담 추가'; g('emErr').textContent='';
  g('emDate').value=dk(new Date());
  g('emType').value='소비자'; g('emClient').value=''; g('emPhone').value='';
  g('emAddr').value=''; g('emBranch').value=CU.branch||BRANCHES[0]; g('emMgr').value=CU.role==='sales'?CU.name:'';
  g('emSource').value=''; g('emCat').value=''; g('emStatus').value='consult';
  g('emRevenue').value=''; g('emTeam').value=''; g('emBuildDate').value=''; g('emNote').value='';
  // 영업직원은 본인 지점으로 고정
  applyBranchLock();
  g('emDelBtn').style.display='none';
  g('editModal').classList.add('on');
}
// 영업직원이면 지점 셀렉트를 본인 지점으로 잠금
function applyBranchLock(){
  const sel=g('emBranch');
  if(CU && CU.role==='sales' && CU.branch){ sel.value=CU.branch; sel.disabled=true; }
  else sel.disabled=false;
}
function openEdit(id){
  const r=loadRecords().find(x=>x.id===id); if(!r) return;
  // 영업직원은 타 지점 기록 편집 불가
  if(CU && CU.role==='sales' && CU.branch && r.branch!==CU.branch){
    showToast('다른 지점의 상담은 편집할 수 없습니다.', false); return;
  }
  editingId=id;
  g('emTitle').textContent='상담 편집'; g('emErr').textContent='';
  g('emDate').value=r.date||''; g('emType').value=r.type||'소비자';
  g('emClient').value=r.client||''; g('emPhone').value=r.phone||'';
  g('emAddr').value=r.addr||''; g('emBranch').value=r.branch||BRANCHES[0]; g('emMgr').value=r.mgr||'';
  g('emSource').value=r.source||''; g('emCat').value=r.cat||''; g('emStatus').value=r.status||'consult';
  g('emRevenue').value=r.revenue?numFmt(r.revenue):''; g('emTeam').value=r.team||'';
  g('emBuildDate').value=r.buildDate||''; g('emNote').value=r.note||'';
  applyBranchLock();
  g('emDelBtn').style.display=(CU.role==='admin'||CU.role==='manager'||r.mgr===CU.name)?'':'none';
  g('editModal').classList.add('on');
}
function editFromDetail(){ closeModal('detailModal'); if(detId) openEdit(detId); }
async function saveRecord(){
  const client=g('emClient').value.trim(), date=g('emDate').value;
  if(!date){ g('emErr').textContent='상담일을 입력하세요.'; return; }
  if(!client){ g('emErr').textContent='고객(업체)명을 입력하세요.'; return; }
  const mgr=g('emMgr').value.trim();
  if(!mgr){ g('emErr').textContent='담당자를 입력하세요.'; return; }
  // 영업직원은 본인 지점으로 강제 (disabled 셀렉트 우회 방지)
  const branch=(CU && CU.role==='sales' && CU.branch) ? CU.branch : g('emBranch').value;
  const rec={
    id: editingId||uid(),
    date, type:g('emType').value, client, phone:g('emPhone').value.trim(),
    addr:g('emAddr').value.trim(), branch, mgr,
    source:g('emSource').value, cat:g('emCat').value, status:g('emStatus').value,
    revenue:Number(g('emRevenue').value.replace(/[^0-9]/g,''))||0,
    team:g('emTeam').value.trim(), buildDate:g('emBuildDate').value,
    note:g('emNote').value.trim(),
    updatedAt:new Date().toISOString(), updatedBy:CU.name,
  };
  const rs=loadRecords();
  const i=rs.findIndex(x=>x.id===rec.id);
  if(i>=0) rs[i]=rec; else rs.unshift(rec);
  saveRecords(rs);
  closeModal('editModal'); rebuildFilters(); renderView();
  showToast(editingId?'상담이 수정되었습니다.':'상담이 추가되었습니다.');
  // 서버에는 기존 saveProject 액션에 _rec(payload)로 저장 → 백엔드 호환
  await apiPost({action:'saveProject', payload:JSON.stringify({id:rec.id, name:rec.client, branch:rec.branch, mgr:rec.mgr, _rec:JSON.stringify(rec)})});
}
async function deleteRecord(){
  if(!editingId) return;
  if(!confirm('이 상담 기록을 삭제할까요?')) return;
  saveRecords(loadRecords().filter(r=>r.id!==editingId));
  closeModal('editModal'); rebuildFilters(); renderView();
  showToast('삭제되었습니다.');
  await apiPost({action:'deleteProject', id:editingId});
}

// ══════════════════════════════════════════════
//  엑셀 내보내기 (CSV with BOM — 한글 호환)
// ══════════════════════════════════════════════
function exportXlsx(){
  const rs=filteredRecords();
  if(!rs.length){ showToast('내보낼 데이터가 없습니다.', false); return; }
  const head=['상담일','고객유형','고객(업체)','전화번호','현장주소','지점','담당자','유입경로','시공구분','진행상황','견적/결제금액','시공팀','시공일','상세내용'];
  const lines=[head.join(',')];
  rs.forEach(r=>{
    const row=[r.date, r.type, r.client, r.phone, r.addr, r.branch, r.mgr, r.source, r.cat, statusObj(r.status).name, r.revenue, r.team, r.buildDate, r.note]
      .map(v=>{ const s=String(v==null?'':v).replace(/"/g,'""'); return /[",\n]/.test(s)?`"${s}"`:s; });
    lines.push(row.join(','));
  });
  const blob=new Blob(['\uFEFF'+lines.join('\n')], {type:'text/csv;charset=utf-8;'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download=`상담목록_${dk(new Date())}.csv`;
  a.click(); URL.revokeObjectURL(a.href);
  showToast('엑셀(CSV) 파일이 저장되었습니다.');
}

function openUserMgr(){ umRender(); g('umErr').textContent=''; g('userMgrModal').classList.add('on'); }
function umRender(){
  const users=loadUsers();
  let h=`<table class="user-table"><thead><tr><th>이름</th><th>아이디</th><th>지점</th><th>권한</th><th>관리</th></tr></thead><tbody>`;
  h+=`<tr style="opacity:.7;"><td>관리자</td><td style="font-family:monospace;">admin</td><td>-</td><td>관리자</td><td style="font-size:11px;color:#94a3b8;">기본계정</td></tr>`;
  users.forEach(u=>{
    if(u.id==='admin') return;
    const role=u.role==='admin'?'관리자(임원)':u.role==='manager'?'매니저':'영업';
    const isAdmin=u.role==='admin';
    const promoteBtn = isAdmin
      ? `<button onclick="umSetRole('${esc(u.id)}','sales')" style="padding:3px 9px;background:#fef3c7;color:#b45309;border:none;border-radius:5px;font-size:11px;font-weight:600;cursor:pointer;">영업으로</button>`
      : `<button onclick="umSetRole('${esc(u.id)}','admin')" style="padding:3px 9px;background:#dbeafe;color:#1e40af;border:none;border-radius:5px;font-size:11px;font-weight:600;cursor:pointer;">관리자 승격</button>`;
    h+=`<tr><td>${escH(u.name)}</td><td style="font-family:monospace;">${escH(u.id)}</td><td>${escH(u.branch||'-')}</td>
      <td><span style="font-weight:700;color:${isAdmin?'#1e40af':'#475569'};">${role}</span></td>
      <td style="display:flex;gap:5px;">${promoteBtn}
        <button onclick="umDelete('${esc(u.id)}')" style="padding:3px 9px;background:#fee2e2;color:#b91c1c;border:none;border-radius:5px;font-size:11px;font-weight:600;cursor:pointer;">삭제</button></td></tr>`;
  });
  h+='</tbody></table><div style="font-size:11px;color:var(--text3);margin-top:8px;">※ 관리자(임원)는 대성하우징 전체 지점·개인 실적을 조회할 수 있습니다.</div>';
  g('umList').innerHTML=h;
}
async function umSetRole(id, role){
  const label = role==='admin'?'관리자(임원)로 승격':'영업직원으로 변경';
  if(!confirm(`이 계정을 ${label}할까요?`)) return;
  const users=loadUsers();
  const u=users.find(x=>x.id===id); if(!u) return;
  u.role=role; saveUsers(users);
  const r=await apiPost({action:'addUser',id:u.id,name:u.name,pw:u.pw,role:u.role,branch:u.branch||''});
  if(r&&r.ok) showToast(`권한이 변경되었습니다 (${role==='admin'?'관리자':'영업'}).`);
  else showToast('로컬엔 반영됐지만 서버 동기화 실패. 🔄 동기화를 눌러주세요.', false);
  umRender();
}
async function umAddUser(){
  const name=g('umName').value.trim(), id=g('umId').value.trim();
  const branch=g('umBranch').value.trim(), pw=g('umPw').value.trim();
  if(!name||!id||!pw){ g('umErr').textContent='이름·아이디·비밀번호는 필수입니다.'; return; }
  if(pw.length<6){ g('umErr').textContent='비밀번호는 6자 이상이어야 합니다.'; return; }
  const users=loadUsers();
  if(users.find(u=>u.id===id)){ g('umErr').textContent='이미 사용 중인 아이디입니다.'; return; }
  users.push({id,name,pw,role:'sales',branch}); saveUsers(users);
  const r=await apiPost({action:'addUser',id,name,pw,role:'sales',branch});
  g('umName').value=''; g('umId').value=''; g('umPw').value='';
  g('umErr').textContent= (!r||!r.ok)?'⚠️ 로컬엔 저장됐지만 서버 동기화 실패. 🔄 동기화를 눌러주세요.':'';
  if(r&&r.ok) showToast('계정이 추가되었습니다.');
  umRender(); rebuildFilters();
}
async function umDelete(id){
  if(id==='admin') return;
  if(!confirm('이 계정을 삭제할까요?')) return;
  saveUsers(loadUsers().filter(u=>u.id!==id));
  await apiPost({action:'deleteUser',id});
  umRender();
}

// ══════════════════════════════════════════════
//  연동 설정
// ══════════════════════════════════════════════
function openApiSetup(){
  g('apiUrlInput').value=getApiUrl();
  const st=g('apiStatus');
  st.textContent=getApiUrl()?'✅ 현재 연동됨':'⚠️ 미연동 (이 브라우저에만 저장 중)';
  st.style.color=getApiUrl()?'#15803d':'#d97706';
  g('apiModal').classList.add('on');
}
function saveApiUrl(){
  const url=g('apiUrlInput').value.trim();
  if(url && !/^https:\/\/script\.google\.com\/macros\/s\/.+\/exec$/.test(url)){
    g('apiStatus').textContent='⚠️ URL 형식 확인 (…/exec 로 끝나야 함). 다시 저장 누르면 강제 저장.';
    g('apiStatus').style.color='#d97706';
    if(g('apiUrlInput').dataset.warned!=='1'){ g('apiUrlInput').dataset.warned='1'; return; }
  }
  localStorage.setItem('ds_api_url', url);
  g('apiUrlInput').dataset.warned='';
  g('apiStatus').textContent='✅ 저장됨. 동기화를 시작합니다…';
  g('apiStatus').style.color='#15803d';
  setSync('ok'); if(url) syncFromAPI();
  setTimeout(()=>closeModal('apiModal'), 800);
}
function clearApiUrl(){
  if(!confirm('연동을 해제할까요? 이후 입력은 이 브라우저에만 저장됩니다.')) return;
  localStorage.removeItem('ds_api_url');
  g('apiStatus').textContent='연동이 해제되었습니다.'; g('apiStatus').style.color='#64748b';
  setSync('ok');
}
async function testApiUrl(){
  const url=g('apiUrlInput').value.trim();
  if(!url){ g('apiStatus').textContent='URL을 먼저 입력하세요.'; g('apiStatus').style.color='#d97706'; return; }
  g('apiStatus').textContent='연결 확인 중…'; g('apiStatus').style.color='#0369a1';
  try{
    const res=await fetch(url+'?action=getProjects&_t='+Date.now(),{cache:'no-store'});
    const j=JSON.parse(await res.text());
    if(j&&j.ok){ g('apiStatus').textContent='✅ 연결 성공! 저장을 누르세요.'; g('apiStatus').style.color='#15803d'; }
    else{ g('apiStatus').textContent='⚠️ 응답 형식이 예상과 다릅니다.'; g('apiStatus').style.color='#d97706'; }
  }catch(e){ g('apiStatus').textContent='❌ 연결 실패. URL·배포 권한(모든 사용자)을 확인하세요.'; g('apiStatus').style.color='#b91c1c'; }
}

// ── 공통 ──
function closeModal(id){ g(id).classList.remove('on'); }
document.querySelectorAll('.overlay').forEach(el=>{ el.addEventListener('click',e=>{ if(e.target===el) el.classList.remove('on'); }); });
document.addEventListener('keydown',e=>{ if(e.key==='Escape') document.querySelectorAll('.overlay.on').forEach(el=>el.classList.remove('on')); });
(function(){ const s=localStorage.getItem('ds_saved_id'); if(s&&g('liId')) g('liId').value=s; })();

restoreSession();
setInterval(()=>{ if(CU&&API_URL) syncFromAPI(); }, 30000);
</script>
